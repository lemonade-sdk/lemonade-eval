# Prometheus Configuration for Lemonade Eval Dashboard
# Metrics scraping configuration

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'lemonade-dashboard'
    environment: 'production'

# Alertmanager configuration (optional)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

# Rule files for recording rules and alerts
rule_files:
  # - "alerts.yml"

# Scrape configurations
scrape_configs:
  # ============================================================================
  # PROMETHEUS (self-monitoring)
  # ============================================================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

  # ============================================================================
  # BACKEND API (FastAPI)
  # ============================================================================
  - job_name: 'backend'
    static_configs:
      - targets: ['backend:8000']
        labels:
          service: 'backend'
          application: 'lemonade-eval-dashboard'
    metrics_path: /metrics
    scrape_interval: 15s
    scrape_timeout: 10s

  # ============================================================================
  # NODE EXPORTER (System metrics - add if installed)
  # ============================================================================
  # - job_name: 'node'
  #   static_configs:
  #     - targets: ['node-exporter:9100']
  #       labels:
  #         service: 'node-exporter'

  # ============================================================================
  # POSTGRESQL (Database metrics - using postgres-exporter)
  # ============================================================================
  # - job_name: 'postgresql'
  #   static_configs:
  #     - targets: ['postgres-exporter:9187']
  #       labels:
  #         service: 'postgresql'

  # ============================================================================
  # REDIS (Cache metrics - using redis-exporter)
  # ============================================================================
  # - job_name: 'redis'
  #   static_configs:
  #     - targets: ['redis-exporter:9121']
  #       labels:
  #         service: 'redis'

  # ============================================================================
  # GRAFANA (Self-monitoring)
  # ============================================================================
  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']
        labels:
          service: 'grafana'
