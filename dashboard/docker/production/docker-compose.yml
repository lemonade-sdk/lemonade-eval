# Production Docker Compose Configuration
# Lemonade Eval Dashboard - Production Deployment

version: '3.8'

services:
  # ============================================================================
  # DATABASE
  # ============================================================================
  db:
    image: postgres:16-alpine
    container_name: lemonade-db
    environment:
      POSTGRES_DB: lemonade_dashboard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_in_production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G

  # ============================================================================
  # REDIS (Caching & Rate Limiting)
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: lemonade-redis
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  # ============================================================================
  # BACKEND API
  # ============================================================================
  backend:
    image: ghcr.io/lemonade-sdk/lemonade-eval-dashboard-backend:latest
    container_name: lemonade-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      # Database
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-change_in_production}@db:5432/lemonade_dashboard
      DATABASE_ASYNC_URL: postgresql+asyncpg://postgres:${DB_PASSWORD:-change_in_production}@db:5432/lemonade_dashboard

      # Redis
      REDIS_URL: redis://redis:6379/0

      # Security
      SECRET_KEY: ${SECRET_KEY:-change_in_production_minimum_32_characters_long}
      DEBUG: "false"

      # CORS
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}

      # Rate limiting
      RATE_LIMIT_ENABLED: "true"
      RATE_LIMIT_DEFAULT: "100"
      RATE_LIMIT_BURST: "200"

      # Application
      APP_NAME: "Lemonade Eval Dashboard"
      APP_VERSION: "1.0.0"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '2'
          memory: 2G
      restart_policy:
        condition: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================================================
  # CELERY WORKER (Background Tasks)
  # ============================================================================
  celery-worker:
    image: ghcr.io/lemonade-sdk/lemonade-eval-dashboard-backend:latest
    container_name: lemonade-celery-worker
    command: celery -A app.services.scheduler worker --loglevel=info --pool=gevent --concurrency=4
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-change_in_production}@db:5432/lemonade_dashboard
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change_in_production_minimum_32_characters_long}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '2'
          memory: 2G
      restart_policy:
        condition: on-failure

  # ============================================================================
  # CELERY BEAT (Scheduled Tasks)
  # ============================================================================
  celery-beat:
    image: ghcr.io/lemonade-sdk/lemonade-eval-dashboard-backend:latest
    container_name: lemonade-celery-beat
    command: celery -A app.services.scheduler beat --loglevel=info
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-change_in_production}@db:5432/lemonade_dashboard
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change_in_production_minimum_32_characters_long}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
      restart_policy:
        condition: on-failure

  # ============================================================================
  # FRONTEND (React)
  # ============================================================================
  frontend:
    image: ghcr.io/lemonade-sdk/lemonade-eval-dashboard-frontend:latest
    container_name: lemonade-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-/api}
    environment:
      VITE_API_URL: ${VITE_API_URL:-/api}
    networks:
      - frontend
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1'
          memory: 512M
    depends_on:
      - backend

  # ============================================================================
  # NGINX (Reverse Proxy)
  # ============================================================================
  nginx:
    image: nginx:alpine
    container_name: lemonade-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - frontend
      - backend
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 256M
    restart: always

  # ============================================================================
  # PROMETHEUS (Metrics Collection)
  # ============================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: lemonade-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    restart: always

  # ============================================================================
  # GRAFANA (Metrics Visualization)
  # ============================================================================
  grafana:
    image: grafana/grafana:latest
    container_name: lemonade-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - backend
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
    restart: always

# ============================================================================
# VOLUMES
# ============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

# ============================================================================
# NETWORKS
# ============================================================================
networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
