name: Auto-Integration Testing

on:
  push:
    branches: [main, develop, feature/*]
    paths:
      - 'dashboard/backend/**'
      - 'dashboard/frontend/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'dashboard/backend/**'
      - 'dashboard/frontend/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================================
  # BACKEND TESTS
  # ============================================================================
  backend-unit-tests:
    name: Backend Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        working-directory: ./dashboard/backend
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests
        working-directory: ./dashboard/backend
        run: |
          pytest tests/ \
            -v \
            --tb=short \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=html \
            --cov-report=json \
            --html=unit-test-report.html \
            --self-contained-html \
            -m "unit"

      - name: Upload unit test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-unit-test-report
          path: dashboard/backend/unit-test-report.html
          retention-days: 7

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: |
            dashboard/backend/htmlcov/
            dashboard/backend/coverage.json
          retention-days: 7

  backend-integration-tests:
    name: Backend Integration Tests
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        working-directory: ./dashboard/backend
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run integration tests
        working-directory: ./dashboard/backend
        run: |
          pytest tests/integration/ tests/ -v \
            --tb=short \
            --cov=app \
            --cov-append \
            --html=integration-test-report.html \
            --self-contained-html \
            -m "integration"

      - name: Upload integration test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-integration-test-report
          path: dashboard/backend/integration-test-report.html
          retention-days: 7

  backend-stress-tests:
    name: Backend Stress Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        working-directory: ./dashboard/backend
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run stress tests
        working-directory: ./dashboard/backend
        run: |
          pytest tests/stress/ -v \
            --tb=short \
            --html=stress-test-report.html \
            --self-contained-html \
            -m "not slow"

      - name: Upload stress test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-stress-test-report
          path: dashboard/backend/stress-test-report.html
          retention-days: 7

  # ============================================================================
  # FRONTEND TESTS
  # ============================================================================
  frontend-unit-tests:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./dashboard/frontend
        run: npm ci

      - name: Run unit tests
        working-directory: ./dashboard/frontend
        run: |
          npm run test:coverage

      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: dashboard/frontend/coverage/
          retention-days: 7

  frontend-e2e-tests:
    name: Frontend E2E Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./dashboard/frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ./dashboard/frontend
        run: npx playwright install --with-deps

      - name: Run E2E tests
        working-directory: ./dashboard/frontend
        run: |
          npm run test:e2e
        continue-on-error: true

      - name: Upload E2E test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: dashboard/frontend/playwright-report/
          retention-days: 7

      - name: Upload E2E screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-screenshots
          path: dashboard/frontend/test-results/
          retention-days: 7

  # ============================================================================
  # COVERAGE AND QUALITY GATES
  # ============================================================================
  coverage-summary:
    name: Coverage Summary
    runs-on: ubuntu-latest
    needs: [backend-unit-tests, backend-integration-tests, frontend-unit-tests]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download backend coverage
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: ./backend-coverage

      - name: Download frontend coverage
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: ./frontend-coverage

      - name: Generate coverage summary
        run: |
          echo "## Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f "./backend-coverage/coverage.json" ]; then
            echo "### Backend Coverage" >> $GITHUB_STEP_SUMMARY
            python3 << 'PYEOF' >> $GITHUB_STEP_SUMMARY
          import json
          try:
              with open('./backend-coverage/coverage.json') as f:
                  data = json.load(f)
                  totals = data.get('totals', {})
                  percent = float(totals.get('percent_covered', 0))
                  print(f"- Lines: {totals.get('covered_lines', 0)}/{totals.get('num_lines', 0)} ({percent:.1f}%)")
          except Exception as e:
              print(f"- Coverage data available in artifacts")
          PYEOF
          fi

          if [ -f "./frontend-coverage/coverage-final.json" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Frontend Coverage" >> $GITHUB_STEP_SUMMARY
            python3 << 'PYEOF' >> $GITHUB_STEP_SUMMARY
          import json
          try:
              with open('./frontend-coverage/coverage-final.json') as f:
                  data = json.load(f)
                  total_lines = 0
                  covered_lines = 0
                  for file_data in data.values():
                      lines = file_data.get('lines', {})
                      for line_num, count in lines.items():
                          total_lines += 1
                          if count > 0:
                              covered_lines += 1
                  percent = (covered_lines / total_lines * 100) if total_lines > 0 else 0
                  print(f"- Lines: {covered_lines}/{total_lines} ({percent:.1f}%)")
          except Exception as e:
              print(f"- Coverage data available in artifacts")
          PYEOF
          fi

  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    needs: [backend-unit-tests, backend-integration-tests]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download backend coverage
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: ./backend-coverage

      - name: Check backend coverage threshold
        run: |
          python3 << 'PYEOF'
          import json
          import sys

          try:
              with open('./backend-coverage/coverage.json') as f:
                  data = json.load(f)
                  totals = data.get('totals', {})
                  percent = float(totals.get('percent_covered', 0))

                  print(f"Backend coverage: {percent:.1f}%")

                  if percent < 60.0:
                      print("ERROR: Backend coverage below 60% threshold")
                      sys.exit(1)
                  else:
                      print("PASS: Backend coverage meets threshold")
          except Exception as e:
              print(f"Warning: Could not check coverage: {e}")
              print("Coverage report available in artifacts")
          PYEOF

      - name: Download frontend coverage
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: ./frontend-coverage

      - name: Check frontend coverage threshold
        run: |
          python3 << 'PYEOF'
          import json
          import sys

          try:
              with open('./frontend-coverage/coverage-final.json') as f:
                  data = json.load(f)
                  total_lines = 0
                  covered_lines = 0
                  for file_data in data.values():
                      lines = file_data.get('lines', {})
                      for line_num, count in lines.items():
                          total_lines += 1
                          if count > 0:
                              covered_lines += 1
                  percent = (covered_lines / total_lines * 100) if total_lines > 0 else 0

                  print(f"Frontend coverage: {percent:.1f}%")

                  if percent < 50.0:
                      print("ERROR: Frontend coverage below 50% threshold")
                      sys.exit(1)
                  else:
                      print("PASS: Frontend coverage meets threshold")
          except Exception as e:
              print(f"Warning: Could not check coverage: {e}")
              print("Coverage report available in artifacts")
          PYEOF

  # ============================================================================
  # TEST RESULT NOTIFICATION
  # ============================================================================
  test-notification:
    name: Test Notification
    runs-on: ubuntu-latest
    needs: [backend-unit-tests, backend-integration-tests, frontend-unit-tests]
    if: always()

    steps:
      - name: Download all test reports
        uses: actions/download-artifact@v4
        with:
          pattern: "*-test-report"
          path: ./test-reports

      - name: Generate test summary
        run: |
          echo "## Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Run ID: ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "Branch: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # List available reports
          echo "### Available Reports" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for report in ./test-reports/*.html; do
            if [ -f "$report" ]; then
              echo "- $(basename $report)" >> $GITHUB_STEP_SUMMARY
            fi
          done
