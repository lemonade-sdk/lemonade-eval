name: CI Testing

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        working-directory: ./dashboard/backend
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run backend tests
        working-directory: ./dashboard/backend
        run: |
          pytest \
            --cov=app \
            --cov-report=html \
            --cov-report=json \
            --cov-report=term-missing \
            --html=pytest-report.html \
            --self-contained-html \
            -v

      - name: Upload backend coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage-html
          path: dashboard/backend/htmlcov/
          retention-days: 7

      - name: Upload backend coverage JSON
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage-json
          path: dashboard/backend/coverage.json
          retention-days: 7

      - name: Upload backend pytest report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: backend-pytest-report
          path: dashboard/backend/pytest-report.html
          retention-days: 7

  frontend-unit-tests:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./dashboard/frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: ./dashboard/frontend
        run: |
          npm run test:coverage

      - name: Upload frontend coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: dashboard/frontend/coverage/
          retention-days: 7

  frontend-e2e-tests:
    name: Frontend E2E Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./dashboard/frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ./dashboard/frontend
        run: npx playwright install --with-deps

      - name: Run E2E tests
        working-directory: ./dashboard/frontend
        run: |
          npm run test:e2e || true
        continue-on-error: true

      - name: Upload E2E test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: dashboard/frontend/playwright-report/
          retention-days: 7

      - name: Upload E2E screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-screenshots
          path: dashboard/frontend/test-results/
          retention-days: 7

  coverage-summary:
    name: Coverage Summary
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-unit-tests]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download backend coverage
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage-json
          path: ./backend-coverage

      - name: Download frontend coverage
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: ./frontend-coverage

      - name: Display coverage summary
        run: |
          echo "## Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f "./backend-coverage/coverage.json" ]; then
            echo "### Backend Coverage" >> $GITHUB_STEP_SUMMARY
            python3 -c "
          import json
          with open('./backend-coverage/coverage.json') as f:
              data = json.load(f)
              totals = data.get('totals', {})
              print(f\"Lines: {totals.get('covered_lines', 0)}/{totals.get('num_lines', 0)} ({totals.get('percent_covered', 0):.1f}%)\")
          " >> $GITHUB_STEP_SUMMARY || echo "Backend coverage data available in artifacts" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f "./frontend-coverage/coverage-final.json" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Frontend Coverage" >> $GITHUB_STEP_SUMMARY
            python3 -c "
          import json
          with open('./frontend-coverage/coverage-final.json') as f:
              data = json.load(f)
              total_lines = 0
              covered_lines = 0
              for file_data in data.values():
                  lines = file_data.get('lines', {})
                  for line_num, count in lines.items():
                      total_lines += 1
                      if count > 0:
                          covered_lines += 1
              percent = (covered_lines / total_lines * 100) if total_lines > 0 else 0
              print(f\"Lines: {covered_lines}/{total_lines} ({percent:.1f}%)\")
          " >> $GITHUB_STEP_SUMMARY || echo "Frontend coverage data available in artifacts" >> $GITHUB_STEP_SUMMARY
          fi

  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-unit-tests]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download backend coverage
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage-json
          path: ./backend-coverage

      - name: Check backend coverage threshold
        run: |
          python3 << 'EOF'
          import json
          import sys

          try:
              with open('./backend-coverage/coverage.json') as f:
                  data = json.load(f)
                  totals = data.get('totals', {})
                  percent = float(totals.get('percent_covered', 0))

                  print(f"Backend coverage: {percent:.1f}%")

                  if percent < 75.0:
                      print("ERROR: Backend coverage below 75% threshold")
                      sys.exit(1)
                  else:
                      print("PASS: Backend coverage meets 75% threshold")
          except Exception as e:
              print(f"Warning: Could not check coverage: {e}")
              print("Coverage report available in artifacts")
          EOF

      - name: Download frontend coverage
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: ./frontend-coverage

      - name: Check frontend coverage threshold
        run: |
          python3 << 'EOF'
          import json
          import sys

          try:
              with open('./frontend-coverage/coverage-final.json') as f:
                  data = json.load(f)
                  total_lines = 0
                  covered_lines = 0
                  for file_data in data.values():
                      lines = file_data.get('lines', {})
                      for line_num, count in lines.items():
                          total_lines += 1
                          if count > 0:
                              covered_lines += 1
                  percent = (covered_lines / total_lines * 100) if total_lines > 0 else 0

                  print(f"Frontend coverage: {percent:.1f}%")

                  if percent < 60.0:
                      print("ERROR: Frontend coverage below 60% threshold")
                      sys.exit(1)
                  else:
                      print("PASS: Frontend coverage meets 60% threshold")
          except Exception as e:
              print(f"Warning: Could not check coverage: {e}")
              print("Coverage report available in artifacts")
